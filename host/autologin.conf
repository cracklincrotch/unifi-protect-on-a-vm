# protect-on-mac — first-boot autologin on the serial console.
#
# stand-up.sh carries this file in the installer initrd; the preseed
# late_command installs it as:
#   /etc/systemd/system/serial-getty@ttyAMA0.service.d/autologin.conf
#
# It makes the serial console (ttyAMA0 — the QEMU PL011 UART, the only
# console the VM has) log straight in as root, so the first-boot hook in
# /root/.bash_profile can run start-here.sh with no typed commands.
#
# This is a one-shot: the hook deletes both this file and itself after it
# runs once, so every boot after the first is a normal login prompt.

[Service]
ExecStart=
ExecStart=-/sbin/agetty --autologin root --keep-baud 115200,38400,9600 %I vt220
