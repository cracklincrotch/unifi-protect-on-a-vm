# Debian 11 (Bullseye) ARM64 — unattended install preseed for the Protect VM.
#
# stand-up.sh embeds this file into the netinst installer's initrd and boots
# the installer with `auto=true priority=critical`, so the install runs with
# no interaction. stand-up.sh appends the root password line to the end of
# this file at build time — the hash comes from the password stand-up.sh
# prompts for. Do not add a passwd/root-password-crypted line here.
#
# This produces a minimal Debian: SSH server + standard utilities, no
# desktop, root login only (no normal user — the project runs as root).

### Localization
d-i debian-installer/locale          string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us

### Network — DHCP on the single NAT interface the installer sees.
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname  string protect-vm
d-i netcfg/get_domain    string local
d-i netcfg/hostname      string protect-vm
# A real hostname is set later by the UniFi install (it becomes UNVR);
# this is only the install-time name.

### Apt mirror — netinst pulls the base system from here.
d-i mirror/country         string manual
d-i mirror/http/hostname   string deb.debian.org
d-i mirror/http/directory  string /debian
d-i mirror/http/proxy      string

### Clock / time zone
d-i clock-setup/utc  boolean true
d-i time/zone        string UTC
d-i clock-setup/ntp  boolean true

### Partitioning — guided, entire disk, all files in one partition.
# The data disks are NOT attached during install, so /dev/vda is the only
# disk. On UEFI, partman-auto adds the EFI System Partition automatically;
# the "atomic" recipe gives one ext4 root plus a swap partition.
d-i partman-auto/disk                       string /dev/vda
d-i partman-auto/method                     string regular
d-i partman-auto/choose_recipe              select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition                select finish
d-i partman/confirm                         boolean true
d-i partman/confirm_nooverwrite             boolean true

### Base system
d-i base-installer/install-recommends boolean false

### Accounts — root only. No normal user is created; the project operates
# as root (a fresh Debian has no sudo). The root password line is appended
# by stand-up.sh from ROOT_PASSWORD_CRYPTED.
d-i passwd/root-login  boolean true
d-i passwd/make-user   boolean false

### Package selection — SSH server + standard utilities, nothing else.
tasksel tasksel/first multiselect ssh-server, standard
d-i pkgsel/upgrade select full-upgrade
popularity-contest popularity-contest/participate boolean false

### Bootloader — GRUB to /dev/vda, and force the removable-media boot file
# (\EFI\BOOT\BOOTAA64.EFI) so the VM boots on its own. This is what the old
# manual boot-menu edit used to set; preseeding it retires that step.
d-i grub-installer/only_debian              boolean true
d-i grub-installer/bootdev                  string /dev/vda
d-i grub-installer/force-efi-extra-removable boolean true

### First-boot autologin — install the autologin override and the
# one-shot /root/.bash_profile hook so the freshly installed VM runs
# start-here.sh on the console with no typed commands. autologin.conf
# and first-boot.sh are carried in this preseed's initrd (stand-up.sh
# appends them next to preseed.cfg), so they are at / in the installer.
# in-target runs commands inside the installed system at /target.
d-i preseed/late_command string \
    in-target mkdir -p /etc/systemd/system/serial-getty@ttyAMA0.service.d ; \
    cp /autologin.conf /target/etc/systemd/system/serial-getty@ttyAMA0.service.d/autologin.conf ; \
    cp /first-boot.sh /target/root/.bash_profile ; \
    in-target chmod 600 /root/.bash_profile

### Finish — no final prompt, just reboot into the installed system.
d-i finish-install/reboot_in_progress note
